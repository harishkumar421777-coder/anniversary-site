<!DOCTYPE html>
<html>
<head>
  <title>Anniversary ❤️</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<video autoplay muted loop playsinline id="bgVideo"
poster="https://res.cloudinary.com/dxw5wzibg/image/upload/v1777053448/d59299d7e5c436cfb29ab5065e8df24f_ps6hmy.jpg">
  <source src="https://res.cloudinary.com/dxw5wzibg/video/upload/v1777052640/fd620b8a9b7e87ec6879fff399bf28c7_720w_w3c7hp.mp4" type="video/mp4">
</video>

<div id="app">

  <div class="screen active" id="start">
    <h1>Hello babygworl!!</h1>
    <div class="heart" onclick="start()">❤️</div>
  </div>

  <div class="screen" id="question">
    <div class="bar"><div id="progress"></div></div>
    <h2 id="qText"></h2>
    <div id="opts"></div>
    <p id="time"></p>
  </div>

  <div id="popup" class="hide">
    <p id="popupText"></p>
    <button onclick="closePop()">OK</button>
  </div>

  <div class="screen" id="reveal">
    <p>But bubu wants to tell you something ❤️</p>
    <div class="heart" onclick="showFinal()">❤️</div>
  </div>

  <div class="screen" id="final">
    <div class="videoBox">
      <video controls autoplay>
        <source src="https://res.cloudinary.com/dxw5wzibg/video/upload/v1777052640/Gilhris___blue_842EAFD_ijhdik.mp4" type="video/mp4">
      </video>
    </div>

    <div class="finalText">
      <h1>Happy 2nd Anniversary ❤️</h1>
      <p>I’ll always look after you and be with you</p>
    </div>
  </div>

</div>

<script src="script.js"></script>
</body>
</html>
